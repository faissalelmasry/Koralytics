<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>OTP Verification</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <!-- Subject: Your Koralytics Verification Code -->
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 5px;">
        <h2 style="color: #0056b3;">Verification Code</h2>
        <p>Hi {{UserName}},</p>
        <p>Here is your One-Time Password (OTP) to verify your request:</p>
        <div style="background-color: #f8f9fa; padding: 15px; text-align: center; font-size: 24px; font-weight: bold; letter-spacing: 5px; margin: 20px 0; border-radius: 4px;">
            {{OtpCode}}
        </div>
        <p>This code is valid for <strong>{{ExpiryMinutes}} minutes</strong>. Please do not share this code with anyone.</p>
        <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;" />
        <p style="font-size: 12px; color: #777; text-align: center;">&copy; {{Year}} Koralytics. All rights reserved.</p>
    </div>
</body>
</html>
