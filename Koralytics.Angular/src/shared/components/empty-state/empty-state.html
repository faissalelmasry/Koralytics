<div class="empty-state-wrapper">
  
  <!-- Cyber Tactical Blueprint Icon (Pure SVG) -->
  <div class="icon-blueprint-container">
    <svg viewBox="0 0 200 200" class="blueprint-svg" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer Clipboard Grid -->
      <rect x="40" y="30" width="120" height="140" rx="12" class="base-board" />
      <rect x="85" y="20" width="30" height="15" rx="4" class="clip-board" />
      
      <!-- Inside Pitch Schematic Line -->
      <line x1="45" y1="100" x2="155" y2="100" class="pitch-mid-line" />
      <circle cx="100" cy="100" r="25" class="pitch-center-circle" />
      
      <!-- Ghost Tactic Dashed Arrow -->
      <path d="M 60 140 Q 80 120 100 135" class="tactic-arrow" />
      <path d="M 140 60 Q 120 80 100 65" class="tactic-arrow" />
      
      <!-- Cyber Question Radar Target -->
      <circle cx="100" cy="100" r="12" class="radar-ping" />
      <text x="100" y="106" class="radar-text">?</text>
    </svg>
  </div>

  <!-- Text Block -->
  <h3 class="empty-title">{{ title }}</h3>
  <p class="empty-desc">{{ description }}</p>

  <!-- Optional Core Action Button -->
  <div class="action-zone" *ngIf="actionText">
    <button class="cyber-empty-btn" (click)="onActionClick()">
      {{ actionText }}
    </button>
  </div>

</div>
