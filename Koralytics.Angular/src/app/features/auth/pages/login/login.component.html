<div class="auth-card-content">
  <div class="header">
    <h2>Welcome back</h2>
    <p>Log in to access your tactical dashboard.</p>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

    <app-text-input label="Email or Username" type="text" formControlName="emailOrUserName" [errorMessage]="emailError">
    </app-text-input>

    <div class="password-group">
      <app-text-input label="Password" type="password" formControlName="password" [errorMessage]="passwordError">
      </app-text-input>
      <a routerLink="/auth/forgot-password" class="forgot-link">Forgot password?</a>
    </div>

    <div class="remember-group">
      <app-checkbox formControlName="rememberMe" label="Remember me for 30 days"></app-checkbox>
    </div>

    <app-button type="submit" variant="accent" [loading]="isLoading" [disabled]="isGoogleLoading"
      class="full-width-btn">
      Log in
    </app-button>

  </form>

  <div class="divider">
    <span>or continue with</span>
  </div>

  <div class="custom-google-wrapper">
    <app-button type="button" variant="slate" class="full-width-btn" [disabled]="isLoading || isGoogleLoading"
      [loading]="isGoogleLoading">
      <div style="display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%;">
        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Google
      </div>

      <!-- Placed inside app-button so hovering triggers the button's hover styles -->
      <div class="google-iframe-overlay" [style.display]="isGoogleLoading ? 'none' : 'block'">
        <div #googleBtnContainer></div>
      </div>
    </app-button>
  </div>

  <div class="footer-text">
    New here? <a routerLink="/auth/register">Create an account</a>
  </div>
</div>
