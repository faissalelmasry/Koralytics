<div class="settings-container">
  <div class="header">
    <h1>Change Password</h1>
    <p>Update your account password. You will be logged out after a successful change.</p>
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="settings-form">
      
      <div class="form-row">
        <app-text-input
          label="Current Password"
          type="password"
          formControlName="oldPassword"
          [errorMessage]="form.get('oldPassword')?.touched && form.get('oldPassword')?.invalid ? 'Required' : ''">
        </app-text-input>
      </div>

      <div class="form-row password-container">
        <app-text-input
          label="New Password"
          type="password"
          formControlName="newPassword"
          [errorMessage]="newPasswordError">
        </app-text-input>
        <app-password-strength [password]="form.get('newPassword')?.value || ''"></app-password-strength>
      </div>

      <div class="form-row">
        <app-text-input
          label="Confirm New Password"
          type="password"
          formControlName="confirmPassword"
          [errorMessage]="form.errors?.['mismatch'] && form.get('confirmPassword')?.touched ? 'Passwords do not match' : ''">
        </app-text-input>
      </div>

      <div class="form-actions">
        <app-button 
          type="submit" 
          variant="accent" 
          [loading]="isLoading">
          Update Password
        </app-button>
      </div>

    </form>
  </div>
</div>
