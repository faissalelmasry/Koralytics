<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Koralytics — player card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: #0a0c0f;
    --text: #f2f3f5;
    --text-dim: #8b909a;
    --accent: #c8ff4d;
    --accent-dim: rgba(200,255,77,0.14);
    --violet: #6a5cff;
    --coral: #ff6a5c;
    --field-bg: #1b1f26;
    --field-border: #2a2f38;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display:flex; align-items:center; justify-content:center;
    padding: 60px 20px;
  }

  .scene{ perspective: 1400px; }
  .card3d{
    width: 300px; height: 460px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .7s cubic-bezier(.2,.8,.2,1);
    cursor: pointer;
    opacity: 0; transform: translateY(20px) scale(.96);
    animation: cardRise .7s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes cardRise{ to{ opacity:1; transform: translateY(0) scale(1); } }
  .card3d.flipped{ transform: rotateY(180deg); }
  .card3d:not(.flipped):hover{ transform: rotateY(0deg) scale(1.02); }

  .face{
    position: absolute; inset: 0;
    border-radius: 22px;
    backface-visibility: hidden;
    overflow: hidden;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.65);
    border: 1px solid var(--field-border);
  }

  /* ---------- front ---------- */
  .front{
    background:
      radial-gradient(140% 90% at 15% 0%, rgba(200,255,77,0.16), transparent 55%),
      radial-gradient(120% 90% at 100% 100%, rgba(106,92,255,0.18), transparent 55%),
      linear-gradient(160deg, #14171c, #0e1013 70%);
    padding: 20px 20px 18px;
    display: flex; flex-direction: column;
  }
  .front::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:100%;
    background: repeating-linear-gradient(115deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 60px);
    pointer-events:none;
  }
  .top-row{ display:flex; align-items:flex-start; justify-content: space-between; position: relative; z-index:1; }
  .rating-block{ text-align:left; }
  .rating{ font-family:'Bebas Neue',sans-serif; font-size: 46px; line-height: 0.9; color: var(--accent); }
  .position{ font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--text-dim); margin-top: 2px; }
  .crest{
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--field-bg); border: 1px solid var(--field-border);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size: 14px; color: var(--accent);
  }

  .photo-wrap{
    flex: 1; display:flex; align-items:center; justify-content:center;
    position: relative; z-index: 1; margin: 6px 0 4px;
  }
  .photo{
    width: 130px; height: 130px; border-radius: 50%;
    background: linear-gradient(150deg, #2a2f38, #1b1f26);
    border: 2px solid rgba(200,255,77,0.35);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size: 44px; color: var(--text-dim);
  }

  .name-band{
    position: relative; z-index: 1;
    text-align:center; font-family:'Bebas Neue',sans-serif;
    font-size: 22px; letter-spacing: 1px;
    padding: 8px 0 12px;
    border-bottom: 1px solid var(--field-border);
    margin-bottom: 12px;
  }

  .stats-grid{
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px;
  }
  .stat{ display:flex; flex-direction:column; gap: 5px; }
  .stat-top{ display:flex; align-items:center; justify-content:space-between; font-size: 13px; }
  .stat .num{ font-family:'Bebas Neue',sans-serif; font-size: 19px; color: var(--accent); }
  .stat .label{ color: var(--text-dim); letter-spacing: 1px; font-weight: 600; }
  .stat-bar{ height: 3px; border-radius: 2px; background: var(--field-border); overflow: hidden; }
  .stat-bar .fill{
    display:block; height: 100%; width: 0%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--coral));
    transition: width 1.1s cubic-bezier(.16,.84,.44,1);
  }

  .bottom-row{
    position: relative; z-index: 1;
    display:flex; align-items:center; justify-content:space-between;
    margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--field-border);
    font-size: 11.5px; color: var(--text-dim);
  }
  .foot-stars{ display:flex; align-items:center; gap: 4px; }
  .foot-stars i{ font-style: normal; color: var(--field-border); font-size: 12px; }
  .foot-stars i.on{ color: var(--accent); }
  .flip-hint{ position:absolute; bottom: 10px; right: 14px; font-size: 10.5px; color: var(--text-dim); z-index:1; opacity:.7; }

  /* ---------- back ---------- */
  .back{
    background: linear-gradient(165deg, #14171c, #0e1013 70%);
    transform: rotateY(180deg);
    padding: 24px 22px;
    display:flex; flex-direction:column;
  }
  .back h3{
    font-family:'Bebas Neue',sans-serif; font-size: 24px; letter-spacing: 1px;
    margin: 0 0 4px;
  }
  .back .sub{ color: var(--text-dim); font-size: 12.5px; margin: 0 0 20px; }
  .info-row{
    display:flex; align-items:center; justify-content:space-between;
    font-size: 13px; padding: 10px 0; border-bottom: 1px solid var(--field-border);
  }
  .info-row span:first-child{ color: var(--text-dim); }
  .info-row span:last-child{ font-weight: 600; }
  .back-note{ margin-top: auto; font-size: 11.5px; color: var(--text-dim); text-align:center; }

  @media (prefers-reduced-motion: reduce){
    .card3d{ transition: none; }
  }
</style>
</head>
<body>

  <div class="scene">
    <div class="card3d" id="card">

      <div class="face front">
        <div class="top-row">
          <div class="rating-block">
            <div class="rating" id="ratingNum" data-target="88">0</div>
            <div class="position">ST</div>
          </div>
          <div class="crest">KA</div>
        </div>

        <div class="photo-wrap">
          <div class="photo">FM</div>
        </div>

        <div class="name-band">FARID MOSTAFA</div>

        <div class="stats-grid">
          <div class="stat">
            <div class="stat-top"><span class="num" data-target="89">0</span><span class="label">PAC</span></div>
            <div class="stat-bar"><span class="fill" data-fill="89"></span></div>
          </div>
          <div class="stat">
            <div class="stat-top"><span class="num" data-target="85">0</span><span class="label">DRI</span></div>
            <div class="stat-bar"><span class="fill" data-fill="85"></span></div>
          </div>
          <div class="stat">
            <div class="stat-top"><span class="num" data-target="83">0</span><span class="label">SHO</span></div>
            <div class="stat-bar"><span class="fill" data-fill="83"></span></div>
          </div>
          <div class="stat">
            <div class="stat-top"><span class="num" data-target="41">0</span><span class="label">DEF</span></div>
            <div class="stat-bar"><span class="fill" data-fill="41"></span></div>
          </div>
          <div class="stat">
            <div class="stat-top"><span class="num" data-target="76">0</span><span class="label">PAS</span></div>
            <div class="stat-bar"><span class="fill" data-fill="76"></span></div>
          </div>
          <div class="stat">
            <div class="stat-top"><span class="num" data-target="78">0</span><span class="label">PHY</span></div>
            <div class="stat-bar"><span class="fill" data-fill="78"></span></div>
          </div>
        </div>

        <div class="bottom-row">
          <div class="foot-stars" aria-label="Weak foot rating 4 out of 5">
            <i class="on">&#9733;</i><i class="on">&#9733;</i><i class="on">&#9733;</i><i class="on">&#9733;</i><i>&#9733;</i>
          </div>
          <span>Right foot</span>
        </div>
        <div class="flip-hint">tap to flip</div>
      </div>

      <div class="face back">
        <h3>Farid Mostafa</h3>
        <p class="sub">Striker · Overall rating 88</p>
        <div class="info-row"><span>Club</span><span>Curva Hagz FC</span></div>
        <div class="info-row"><span>Age</span><span>24</span></div>
        <div class="info-row"><span>Height</span><span>181 cm</span></div>
        <div class="info-row"><span>Weak foot</span><span>4 / 5</span></div>
        <div class="info-row"><span>Preferred foot</span><span>Right</span></div>
        <div class="info-row"><span>Matches tracked</span><span>142</span></div>
        <p class="back-note">tap to flip back</p>
      </div>

    </div>
  </div>

<script>
  const card = document.getElementById('card');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }

  function countUp(el, target, duration, delay){
    if(reduceMotion){ el.textContent = target; return; }
    setTimeout(() => {
      const start = performance.now();
      function tick(now){
        const p = Math.min((now - start) / duration, 1);
        const eased = easeOutCubic(p);
        el.textContent = Math.round(eased * target);
        if(p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }, delay);
  }

  function runStatsIntro(){
    const ratingEl = document.getElementById('ratingNum');
    countUp(ratingEl, parseInt(ratingEl.dataset.target, 10), 1100, 250);

    document.querySelectorAll('.stat').forEach((stat, i) => {
      const numEl = stat.querySelector('.num');
      const fillEl = stat.querySelector('.fill');
      const target = parseInt(numEl.dataset.target, 10);
      const delay = 450 + i * 120;
      countUp(numEl, target, 900, delay);
      setTimeout(() => { fillEl.style.width = target + '%'; }, delay);
    });
  }

  let introRan = false;
  function runStatsIntroOnce(){
    if(introRan) return;
    introRan = true;
    runStatsIntro();
  }
  if(document.readyState === 'complete'){ runStatsIntroOnce(); }
  else{ window.addEventListener('load', runStatsIntroOnce); }

  card.addEventListener('click', () => {
    card.classList.toggle('flipped');
  });

  if(!reduceMotion){
    card.addEventListener('mousemove', (e) => {
      if(card.classList.contains('flipped')) return;
      const rect = card.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width;
      const py = (e.clientY - rect.top) / rect.height;
      const rotateY = (px - 0.5) * 14;
      const rotateX = (0.5 - py) * 14;
      card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
    });
    card.addEventListener('mouseleave', () => {
      if(!card.classList.contains('flipped')){
        card.style.transform = 'rotateX(0deg) rotateY(0deg)';
      }
    });
  }
</script>

</body>
</html>
