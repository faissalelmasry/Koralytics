<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koralytics - Pro Scout Benchmark</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Chakra+Petch:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      /* Extracting directly from Image Palette */
      --bg-dark: #0d0f14;
      --panel-bg: #131722;
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-muted: #808a9d;
      
      /* UI Accent Colors from Reference Image */
      --electric-lime: #ccff00;   /* Bright Green/Lime from + Schedule button */
      --electric-cyan: #00e5ff;   /* Cyan / Turquoise from Scheduled buttons */
      --status-orange: #ff9900;   /* In Progress Orange for Passed/Above Avg */
      --status-gold: #ffd700;     /* Yellow/Gold for Not Passed */

      /* Glow Effects */
      --glow-orange: rgba(255, 153, 0, 0.25);
      --glow-gold: rgba(255, 215, 0, 0.25);
      --glow-lime: rgba(204, 255, 0, 0.25);
      --glow-cyan: rgba(0, 229, 255, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 10%, rgba(204, 255, 0, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(0, 229, 255, 0.03) 0%, transparent 40%);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      padding: 25px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .koralytics-dashboard {
      max-width: 1240px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 1. HEADER BANNER */
    .hero-banner {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 22px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .hero-banner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 2px;
      background: linear-gradient(90deg, var(--electric-lime), var(--electric-cyan), var(--status-orange));
    }

    .player-profile-brand { display: flex; align-items: center; gap: 18px; }

    .brand-avatar {
      width: 58px; height: 58px;
      border-radius: 14px;
      background: rgba(204, 255, 0, 0.08);
      border: 1.5px solid var(--electric-lime);
      box-shadow: 0 0 12px var(--glow-lime);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Chakra Petch', sans-serif;
      font-size: 20px; font-weight: 700; color: var(--electric-lime);
    }

    .player-details h1 {
      font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 12px;
    }

    .archetype-badge {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 11px;
      background: rgba(0, 229, 255, 0.1);
      border: 1px solid var(--electric-cyan);
      color: var(--electric-cyan);
      padding: 4px 12px;
      border-radius: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .sub-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }

    .benchmark-pills { display: flex; gap: 14px; }

    .pill-stat {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--panel-border);
      padding: 10px 18px; border-radius: 12px;
      display: flex; flex-direction: column; align-items: flex-end;
    }

    .pill-lbl { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
    .pill-val { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--electric-lime); line-height: 1; }

    /* 2. MAIN LAYOUT GRID */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
    }

    /* RADAR PANEL */
    .radar-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-title {
      font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
      display: flex; justify-content: space-between; align-items: center;
    }

    .radar-wrapper { width: 100%; height: 320px; position: relative; margin: 15px 0; }

    .ai-insight-box {
      background: rgba(0, 229, 255, 0.04);
      border: 1px solid rgba(0, 229, 255, 0.18);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 11px;
      line-height: 1.5;
      color: #cbd5e1;
    }

    .ai-insight-box strong { color: var(--electric-cyan); }

    /* CATEGORIES GRID */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .metric-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.25s ease;
      position: relative;
    }

    /* DYNAMIC STYLES BASED ON CONDITION (IMAGE INSPIRED BORDERS) */
    .metric-card.above-avg {
      border-color: rgba(255, 153, 0, 0.4);
    }
    .metric-card.above-avg:hover {
      border-color: var(--status-orange);
      box-shadow: 0 0 15px rgba(255, 153, 0, 0.15);
    }

    .metric-card.below-avg {
      border-color: rgba(255, 215, 0, 0.3);
    }
    .metric-card.below-avg:hover {
      border-color: var(--status-gold);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
    }

    .metric-header { display: flex; justify-content: space-between; align-items: center; }
    .metric-name { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: #e2e8f0; }

    .diff-badge {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: 6px;
    }

    .diff-badge.orange {
      background: rgba(255, 153, 0, 0.12);
      color: var(--status-orange);
      border: 1px solid rgba(255, 153, 0, 0.4);
    }

    .diff-badge.gold {
      background: rgba(255, 215, 0, 0.12);
      color: var(--status-gold);
      border: 1px solid rgba(255, 215, 0, 0.4);
    }

    .metric-body { display: flex; align-items: flex-end; justify-content: space-between; margin: 16px 0 12px 0; }
    .p-score-box .lbl { font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
    
    .p-score { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 0.9; }
    .p-score.orange { color: var(--status-orange); text-shadow: 0 0 12px var(--glow-orange); }
    .p-score.gold { color: var(--status-gold); text-shadow: 0 0 12px var(--glow-gold); }

    .acad-score-box { text-align: right; }
    .acad-score-box .lbl { font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
    .acad-score { font-family: 'Bebas Neue', sans-serif; font-size: 24px; line-height: 1; color: var(--electric-cyan); }

    /* TRACK COMPARISON */
    .track-container {
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      position: relative;
      overflow: hidden;
    }

    .player-track-fill {
      height: 100%;
      border-radius: 10px;
      width: 0%;
      transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .player-track-fill.orange {
      background: linear-gradient(90deg, #d97706, var(--status-orange));
    }

    .player-track-fill.gold {
      background: linear-gradient(90deg, #b45309, var(--status-gold));
    }

    .acad-pin {
      position: absolute;
      top: 0; bottom: 0; width: 3px;
      background: var(--electric-cyan);
      box-shadow: 0 0 8px var(--electric-cyan);
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="koralytics-dashboard">

    <!-- HEADER BANNER -->
    <div class="hero-banner">
      <div class="player-profile-brand">
        <div class="brand-avatar">OK</div>
        <div class="player-details">
          <h1>Omar Khaled <span class="archetype-badge" id="playerArchetype">KORALYTICS SCOUT</span></h1>
          <div class="sub-meta" id="academyTitle">Zamalek Academy • Category Benchmark Analysis</div>
        </div>
      </div>

      <div class="benchmark-pills">
        <div class="pill-stat">
          <span class="pill-lbl">Above Avg</span>
          <span class="pill-val kpi-numberInteger" style="color: var(--status-orange);" id="aboveCount">0</span>
        </div>
        <div class="pill-stat">
          <span class="pill-lbl">Avg Rating</span>
          <span class="pill-val kpi-numberFloat" id="avgRating">0.0</span>
        </div>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="dashboard-grid">

      <!-- RADAR PANEL -->
      <div class="radar-card">
        <div class="card-title">
          <span>Skill Radar Comparison</span>
          <span style="color: var(--electric-cyan); font-size: 10px;">● Player vs ● Academy</span>
        </div>

        <div class="radar-wrapper">
          <canvas id="proRadarChart"></canvas>
        </div>

        <div class="ai-insight-box">
          🤖 <strong style="color:var(--electric-cyan)">Koralytics AI Scout:</strong> <span id="scoutNotes">Highlights in <strong style="color:var(--status-orange)">Orange</strong> represent areas exceeding academy averages, while <strong style="color:var(--status-gold)">Gold</strong> represents baseline metrics.</span>
        </div>
      </div>

      <!-- CARDS GRID -->
      <div class="cards-grid" id="cardsGrid"></div>

    </div>

  </div>

  <script>
    // Data Configuration
    const apiData = {
      playerInfo: {
        playerId: 4,
        playerName: "Omar Khaled",
        archetype: "Elite Engine",
        avatar: "OK"
      },
      academyInfo: {
        academyId: 1,
        academyName: "Zamalek Academy"
      },
      stats: [
        { "categoryId": 1, "categoryName": "Passing", "playerAverage": 79.4, "academyAverage": 68.0 },
        { "categoryId": 2, "categoryName": "Shooting", "playerAverage": 70.9, "academyAverage": 64.5 },
        { "categoryId": 3, "categoryName": "Dribbling", "playerAverage": 63.5, "academyAverage": 68.2 },
        { "categoryId": 4, "categoryName": "Defending", "playerAverage": 80.0, "academyAverage": 62.5 },
        { "categoryId": 6, "categoryName": "Speed", "playerAverage": 70.0, "academyAverage": 74.0 },
        { "categoryId": 7, "categoryName": "Physical", "playerAverage": 79.5, "academyAverage": 67.0 }
      ],
      aiScoutNotes: `Omar Khaled excels as a high-impact midfield engine, showcasing exceptional strength in <strong style="color:var(--status-orange)">Defending (+17.5)</strong> and <strong style="color:var(--status-orange)">Physical (+12.5)</strong> over the academy baseline.`
    };

    document.getElementById('academyTitle').innerText = `${apiData.academyInfo.academyName} • Category Benchmark Analysis`;
    document.getElementById('scoutNotes').innerHTML = apiData.aiScoutNotes;
    document.getElementById('playerArchetype').innerText = `⚡ ${apiData.playerInfo.archetype}`;

    const cardsGrid = document.getElementById('cardsGrid');
    let outperformCount = 0;
    let playerRatingSum = 0;

    apiData.stats.forEach(cat => {
      playerRatingSum += cat.playerAverage;
      cat.difference = +(cat.playerAverage - cat.academyAverage).toFixed(1);
      
      const isAboveAvg = cat.difference > 0;
      if(isAboveAvg) outperformCount++;

      const statusColorClass = isAboveAvg ? 'orange' : 'gold';
      const cardContainerClass = isAboveAvg ? 'above-avg' : 'below-avg';

      const cardHtml = `
        <div class="metric-card ${cardContainerClass}">
          <div class="metric-header">
            <span class="metric-name">${cat.categoryName}</span>
            <span class="diff-badge ${statusColorClass}">
              ${isAboveAvg ? '▲ +' : '▼ '}<span class="kpi-numberFloat" data-target="${cat.difference}">${isAboveAvg ? '+' : ''}${cat.difference}</span>
            </span>
          </div>

          <div class="metric-body">
            <div class="p-score-box">
              <div class="lbl">Player Score</div>
              <div class="p-score ${statusColorClass} kpi-numberFloat" data-target="${cat.playerAverage}">0.0</div>
            </div>
            <div class="acad-score-box">
              <div class="lbl">Academy Avg</div>
              <div class="acad-score kpi-numberFloat" data-target="${cat.academyAverage}">0.0</div>
            </div>
          </div>

          <div class="track-container">
            <div class="player-track-fill ${statusColorClass}" data-fill-percentage="${cat.playerAverage}"></div>
            <div class="acad-pin" style="left: ${cat.academyAverage}%" title="Academy Baseline: ${cat.academyAverage}"></div>
          </div>
        </div>
      `;
      cardsGrid.insertAdjacentHTML('beforeend', cardHtml);
    });

    document.getElementById('aboveCount').setAttribute('data-target', outperformCount);
    document.getElementById('avgRating').setAttribute('data-target', (playerRatingSum / apiData.stats.length).toFixed(1));

    // Radar Chart Setup with Matching Neon Colors
    const labels = apiData.stats.map(c => c.categoryName);
    const playerData = apiData.stats.map(c => c.playerAverage);
    const academyData = apiData.stats.map(c => c.academyAverage);

    const ctx = document.getElementById('proRadarChart').getContext('2d');
    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: labels,
        datasets: [
          {
            label: apiData.playerInfo.playerName,
            data: playerData,
            backgroundColor: 'rgba(255, 153, 0, 0.15)',
            borderColor: '#ff9900',
            borderWidth: 2.5,
            pointBackgroundColor: '#ff9900',
            pointRadius: 4
          },
          {
            label: 'Academy Avg',
            data: academyData,
            backgroundColor: 'rgba(0, 229, 255, 0.1)',
            borderColor: '#00e5ff',
            borderWidth: 2,
            borderDash: [4, 4],
            pointBackgroundColor: '#00e5ff',
            pointRadius: 3
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          r: {
            angleLines: { color: 'rgba(255, 255, 255, 0.08)' },
            grid: { color: 'rgba(255, 255, 255, 0.08)' },
            pointLabels: {
              color: '#808a9d',
              font: { size: 10, weight: '700', family: 'Plus Jakarta Sans' }
            },
            ticks: { display: false },
            suggestedMin: 40,
            suggestedMax: 90
          }
        }
      }
    });

    // Counter Animations
    const duration = 1200;

    function animateCounter(element, isFloat = false) {
      const target = parseFloat(element.getAttribute('data-target'));
      const start = parseFloat(element.innerText) || 0;
      let startTime = null;

      function updateCounter(currentTime) {
        if (!startTime) startTime = currentTime;
        const progress = Math.min((currentTime - startTime) / duration, 1);
        const easedProgress = progress * (2 - progress);
        const currentValue = start + (target - start) * easedProgress;

        element.innerText = isFloat 
          ? currentValue.toFixed(1) 
          : Math.floor(currentValue);

        if (progress < 1) {
          requestAnimationFrame(updateCounter);
        } else {
          element.innerText = isFloat ? target.toFixed(1) : target;
        }
      }
      requestAnimationFrame(updateCounter);
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.kpi-numberFloat').forEach(el => animateCounter(el, true));
      document.querySelectorAll('.kpi-numberInteger').forEach(el => animateCounter(el, false));

      setTimeout(() => {
        document.querySelectorAll('.player-track-fill').forEach(el => {
          el.style.width = `${el.getAttribute('data-fill-percentage')}%`;
        });
      }, 300);
    });
  </script>
</body>
</html>
